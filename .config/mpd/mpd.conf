# Music Player Daemon config
music_directory		"~/Music"
playlist_directory	"~/Music/Playlists"
auto_update		"yes"
bind_to_address		"127.0.0.1"
restore_paused		"yes"
max_output_buffer_size	"16384"
pid_file		"/tmp/mpdpid"
db_file			"~/.local/share/mpd_db"
state_file		"~/.local/state/mpd_state"

audio_output {
	type "pipewire"
	name "Pipewire"
}

audio_output {
	type "fifo"
	name "fifo"
	path "/tmp/mpd.fifo"
	format "44100:16:2"
}

