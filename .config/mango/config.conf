#
# MangoWM Config
#
exec-once=~/.config/mango/autostart.sh

### Visual ###
# Colors
rootcolor=0x0B0000FF
bordercolor=0x540000FF
focuscolor=0xC48888FF
urgentcolor=0xBB1122FF

# Gaps
gappih=4
gappiv=4
gappoh=8
gappov=8

# Border
borderpx=2
border_radius=8
no_radius_when_single=0

# Opacity
focused_opacity=1.0
unfocused_opacity=0.8

# Animations
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=zoom
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1

# TODO:
blur=0
shadows=0

### Behaviour ###
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=0
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=8
cursor_size=24
drag_tile_to_tile=0
drag_tile_small=0

# Keyboard
repeat_rate=25
repeat_delay=350
numlockon=1
xkb_rules_layout=cz
xkb_rules_variant=qwerty-mac

# Trackpad
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=0
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# Mouse
mouse_natural_scrolling=0

# Default layouts
tagrule=id:1,layout_name:dwindle
tagrule=id:2,layout_name:dwindle
tagrule=id:3,layout_name:dwindle
tagrule=id:4,layout_name:dwindle
tagrule=id:5,layout_name:dwindle
tagrule=id:6,layout_name:dwindle
tagrule=id:7,layout_name:dwindle
tagrule=id:8,layout_name:dwindle
tagrule=id:9,layout_name:dwindle

### Keybinds ###
bind=SUPER,r,reload_config
bind=SUPER+SHIFT,q,quit
bind=SUPER+SHIFT,w,killclient,

# Menu & terminal
bind=SUPER,p,spawn,rofi -show drun
bind=SUPER+SHIFT,p,spawn,rofi -show run
bind=SUPER,Return,spawn,alacritty

# Window management
bind=SUPER,Tab,focusstack,next
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+ALT,h,resizewin,-50,+0
bind=SUPER+ALT,j,resizewin,+0,+50
bind=SUPER+ALT,k,resizewin,+0,-50
bind=SUPER+ALT,l,resizewin,+50,+0

# Gaps
bind=SUPER,g,incgaps,1
bind=SUPER+SHIFT,g,incgaps,-1
bind=SUPER+ALT,g,togglegaps

# Layouts
bind=SUPER,n,switch_layout
bind=SUPER,Space,setlayout,dwindle
bind=SUPER,d,setlayout,dwindle
bind=SUPER,m,setlayout,monocle
bind=SUPER,s,setlayout,scroller
bind=ALT,Tab,toggleoverview,
bind=SUPER,f,togglefloating,
bind=SUPER+SHIFT,f,togglefullscreen,

# Tag switching
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Tag moving
bind=SUPER+SHIFT,1,tagsilent,1,0
bind=SUPER+SHIFT,2,tagsilent,2,0
bind=SUPER+SHIFT,3,tagsilent,3,0
bind=SUPER+SHIFT,4,tagsilent,4,0
bind=SUPER+SHIFT,5,tagsilent,5,0
bind=SUPER+SHIFT,6,tagsilent,6,0
bind=SUPER+SHIFT,7,tagsilent,7,0
bind=SUPER+SHIFT,8,tagsilent,8,0
bind=SUPER+SHIFT,9,tagsilent,9,0

# Mouse Buttons
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Gestures

### Layer rules ###
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
